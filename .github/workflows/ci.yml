name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a commit SHA (not a movable tag) so a re-tagged
      # or compromised release cannot silently change what runs here.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[foundry,agents,surface,dev]"
      - name: Tests
        run: pytest -q

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Bandit (high severity)
        run: |
          pip install bandit
          bandit -r src -ll -q
      - name: pip-audit
        # Blocking: a known-vulnerable dependency fails the build. If a specific
        # advisory is reviewed and accepted, add `--ignore-vuln <GHSA-id>` here
        # with a comment naming who accepted it and why.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  surface:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: surface
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm test
      - name: npm audit
        # Blocking at high severity: a high/critical advisory fails the build.
        run: npm audit --audit-level=high
